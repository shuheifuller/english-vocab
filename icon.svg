<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <!-- Warm cream background -->
  <rect width="1024" height="1024" fill="#f6f1e8"/>

  <!-- Minimal black cat peeking from the bottom -->
  <g fill="#16161e">
    <!-- Ears (sleek triangles) -->
    <path d="M 302 580 L 272 306 L 480 452 Z"/>
    <path d="M 722 580 L 752 306 L 544 452 Z"/>
    <!-- Head (dome bleeding off the bottom edge) -->
    <circle cx="512" cy="792" r="352"/>
  </g>

  <!-- Amber almond eyes -->
  <g fill="#f2a63c">
    <path d="M -62 0 Q 0 -46 62 0 Q 0 46 -62 0 Z" transform="translate(392 700) rotate(-6)"/>
    <path d="M -62 0 Q 0 -46 62 0 Q 0 46 -62 0 Z" transform="translate(632 700) rotate(6)"/>
  </g>
</svg>
